<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Netflix Clone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            position: absolute;
            width: 100%;
            z-index: 10;
        }

        .logo {
            color: red;
            font-size: 24px;
            font-weight: bold;
        }

        .signin {
            background: red;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 10px;
        }

        .email-box {
            margin-top: 15px;
        }

        .email-box input {
            padding: 10px;
            width: 250px;
        }

        .email-box button {
            padding: 10px;
            background: red;
            border: none;
            color: white;
            cursor: pointer;
        }

        /* Movie Row */
        .row {
            padding: 20px;
        }

        .row-posters {
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }

        .row-posters img {
            width: 150px;
            border-radius: 5px;
            transition: transform 0.3s;
        }

        .row-posters img:hover {
            transform: scale(1.1);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .email-box input {
                width: 150px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">NETFLIX</div>
        <button class="signin">Sign In</button>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="overlay">
            <h1>Unlimited movies, TV shows and more</h1>
            <p>Watch anywhere. Cancel anytime.</p>

            <div class="email-box">
                <input type="email" placeholder="Email address">
                <button>Get Started</button>
            </div>
        </div>
    </section>

    <!-- Movie Row -->
    <section class="row">
        <h2>Popular on Netflix</h2>
        <div class="row-posters">
            <img src="https://via.placeholder.com/150x220">
            <img src="https://via.placeholder.com/150x220">
            <img src="https://via.placeholder.com/150x220">
            <img src="https://via.placeholder.com/150x220">
            <img src="https://via.placeholder.com/150x220">
        </div>
    </section>

    <script>
        document.querySelector(".signin").addEventListener("click", () => {
            alert("Sign-in feature coming soon!");
        });
    </script>

</body>

</html>
